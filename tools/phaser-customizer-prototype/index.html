<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Murpy v2 레이어 렌더러 프로토타입 (Phaser)</title>
<style>
  html,body { margin:0; padding:0; background:#1b1d24; color:#e6e9f0; font-family:-apple-system,'Malgun Gothic',sans-serif; }
  #app { display:flex; height:100vh; }
  #stageWrap { flex:0 0 700px; width:700px; height:700px; display:flex; align-items:center; justify-content:center; }
  #stageWrap.bg-dark { background:#20232c; }
  #stageWrap.bg-gray { background:#8a8f9c; }
  #stageWrap.bg-checker {
    background-image:
      linear-gradient(45deg, #444 25%, transparent 25%),
      linear-gradient(-45deg, #444 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #444 75%),
      linear-gradient(-45deg, transparent 75%, #444 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
    background-color: #666;
  }
  #stage canvas { image-rendering: pixelated; }
  #panel { flex:1; padding:16px; overflow-y:auto; min-width:320px; }
  h2 { font-size:13px; color:#8a93a8; margin:18px 0 8px; text-transform:uppercase; letter-spacing:.05em; }
  h2:first-child { margin-top:0; }
  .row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px; }
  button {
    background:#2a2d38; border:1px solid #3a3e4c; color:#e6e9f0;
    padding:7px 12px; border-radius:8px; cursor:pointer; font-size:13px;
  }
  button:hover { border-color:#5865f2; }
  button.active { background:#3d7eff; border-color:#3d7eff; color:#fff; font-weight:bold; }
  .toggle-row { display:block; font-size:13px; padding:3px 0; color:#c3c9d9; }
  .toggle-row input:disabled + span { color:#565b6b; }
  #debugOut {
    font-family:'Consolas',monospace; font-size:12px; white-space:pre;
    background:#12141a; border:1px solid #2a2d38; border-radius:8px;
    padding:10px 12px; margin-top:8px; color:#8ee08e;
  }
  .hint { font-size:11px; color:#6f7893; margin-top:4px; }
</style>
</head>
<body>
<div id="app">
  <div id="stageWrap" class="bg-dark">
    <div id="stage"></div>
  </div>
  <div id="panel">
    <h2>방향 (Down/Up/Left/Right 화살표키)</h2>
    <div class="row">
      <button class="dir-btn" data-dir="0">앞 down</button>
      <button class="dir-btn" data-dir="1">뒤 up</button>
      <button class="dir-btn" data-dir="2">좌 left</button>
      <button class="dir-btn" data-dir="3">우 right</button>
    </div>

    <h2>스텝 (Space로 순환)</h2>
    <div class="row">
      <button class="step-btn" data-step="0">idle</button>
      <button class="step-btn" data-step="1">walk1</button>
      <button class="step-btn" data-step="2">walk2</button>
    </div>

    <h2>레이어 표시 (toggle hair / top / hat 포함)</h2>
    <div id="layerToggles"></div>

    <h2>프리셋</h2>
    <div class="row">
      <button id="presetBodyOnly">body만</button>
      <button id="presetBodyHair">body+hair</button>
      <button id="presetFull">전체 보기</button>
    </div>

    <h2>배경</h2>
    <div class="row">
      <button class="bg-btn" data-bg="dark">dark</button>
      <button class="bg-btn" data-bg="gray">gray</button>
      <button class="bg-btn" data-bg="checker">checker(투명)</button>
    </div>

    <h2>줌</h2>
    <div class="row">
      <button class="zoom-btn" data-zoom="1">1x</button>
      <button class="zoom-btn active" data-zoom="2">2x</button>
      <button class="zoom-btn" data-zoom="3">3x</button>
      <button class="zoom-btn" data-zoom="4">4x</button>
    </div>

    <h2>디버그</h2>
    <div id="debugOut">-</div>
    <div class="hint">v2 규격: 846x1792 / frame 282x448 / 3col(idle,walk1,walk2) x 4row(down,up,left,right)</div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
