<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Murpy Asset Studio v0.1</title>
<link rel="stylesheet" href="/static/studio.css">
</head>
<body>
<header>
  <h1>Murpy Asset Studio <span class="ver">v0.1</span></h1>
  <div class="load">
    <select id="queue"><option>불러오는 중…</option></select>
    <select id="slot">
      <option value="hat">hat</option>
      <option value="hair">hair</option>
      <option value="top">top</option>
      <option value="bottom">bottom</option>
      <option value="shoes">shoes</option>
      <option value="accessory">accessory</option>
    </select>
    <label>threshold <input id="threshold" type="number" value="85" min="1" max="400"></label>
    <button id="extract" class="primary">추출</button>
  </div>
</header>

<main>
  <aside id="left">
    <section>
      <h2>도구</h2>
      <div class="tools">
        <button data-tool="brush" class="tool active">브러시 <kbd>B</kbd></button>
        <button data-tool="eraser" class="tool">지우개 <kbd>E</kbd></button>
        <button data-tool="component" class="tool">성분삭제 <kbd>C</kbd></button>
      </div>
      <label class="row">크기 <input id="brushSize" type="range" min="1" max="24" value="4"><span id="brushSizeV">4</span></label>
      <p class="hint">브러시는 worn 원본 픽셀을 복원합니다. 색을 새로 만들지 않습니다.</p>
    </section>

    <section>
      <h2>보기</h2>
      <div class="views">
        <button data-view="composite" class="view active">body+item</button>
        <button data-view="item" class="view">item</button>
        <button data-view="worn" class="view">worn</button>
        <button data-view="base" class="view">base</button>
        <button data-view="diff" class="view">diff</button>
      </div>
      <label class="row"><input type="checkbox" id="showUnk" checked> UNK 오버레이 <i class="sw unk"></i></label>
      <label class="row"><input type="checkbox" id="showMask"> 마스크 경계</label>
      <label class="row">줌 <select id="zoom"><option>1</option><option selected>2</option><option>4</option><option>8</option></select></label>
      <p class="hint">주황 = Gemini가 살을 다시 그린 곳. 옷이면 브러시, 살이면 그대로.</p>
    </section>

    <section>
      <h2>편집</h2>
      <div class="tools">
        <button id="undo">되돌리기 <kbd>Ctrl+Z</kbd></button>
        <button id="redo">다시 <kbd>Ctrl+Y</kbd></button>
      </div>
      <button id="reset" class="wide">자동 결과로 초기화</button>
      <label class="row"><input type="checkbox" id="beforeAfter"> 자동결과와 비교(누르는 동안)</label>
    </section>

    <section>
      <h2>내보내기</h2>
      <button id="validate" class="wide">검증</button>
      <button id="export" class="wide primary">item.png 내보내기</button>
      <div id="timer" class="timer">보정 시간 00:00</div>
    </section>
  </aside>

  <div id="stage">
    <canvas id="canvas"></canvas>
    <div id="empty">위에서 아이템을 고르고 <b>추출</b>을 누르세요.</div>
  </div>

  <aside id="right">
    <section>
      <h2>프레임</h2>
      <div id="thumbs" class="thumbs"></div>
    </section>
    <section>
      <h2>리포트</h2>
      <div id="report" class="report">아직 추출하지 않았습니다.</div>
    </section>
  </aside>
</main>

<script src="/static/studio.js"></script>
</body>
</html>
